# NEURIM configuration
# Real hardware/model defaults live here; secrets (EMOTIV_CLIENT_ID/SECRET)
# come from the environment (.env), never from this file.

eeg:
  # EMOTIV_CLIENT_ID / EMOTIV_CLIENT_SECRET are read from environment (.env).
  device: "EPOC_X"
  # 14-channel EPOC X montage (10-20 system, international naming)
  channels:
    - AF3
    - F7
    - F3
    - FC5
    - T7
    - P7
    - O1
    - O2
    - P8
    - T8
    - FC6
    - F4
    - F8
    - AF4
  sample_rate_hz: 128

# Streaming signal conditioning (src/signal_service/preprocessing.py), applied
# before band power / FAA. Without this the raw frontal channels are dominated
# by blink (EOG) and forehead (EMG) activity. notch_hz is the mains frequency
# (60 in North America, 50 elsewhere).
preprocessing:
  enabled: true
  bandpass_low_hz: 1.0
  bandpass_high_hz: 40.0
  notch_hz: 60.0
  notch_q: 30.0
  filter_order: 4
  common_average: true
  eog_channels: ["AF3", "AF4", "F7", "F8"]
  blink_threshold_mad: 5.0
  emg_threshold_mad: 6.0

# Frontal alpha asymmetry: the entire reward signal, r(t).
# FAA = fixed-weight ln(power_right) - ln(power_left) across frontal mirror
# pairs, z-scored against the session baseline.
faa:
  channel_left: "F3"
  channel_right: "F4"
  channel_pairs:
    - ["F7", "F8"]
    - ["AF3", "AF4"]
    - ["F3", "F4"]
    - ["FC5", "FC6"]
  pair_weights:
    "F3/F4": 1.0
    "F7/F8": 0.75
    "AF3/AF4": 0.5
    "FC5/FC6": 0.5
  band_hz: [8.0, 13.0]
  window_s: 2.0            # sliding window per FAA reading. Kept <= presentation
                          # stabilize_s so the scoring window's EEG is entirely
                          # post-morph. 2s of alpha is still ~16-26 cycles.
  update_interval_s: 0.25  # ~4 readings/sec
  baseline_duration_s: 30.0
  clip: [-1.0, 1.0]

# The Optimizer: searches a low-dim projection of the latent space, not the
# raw latent directly. 8 dims (the favorable end of the spec's 8-16 range)
# converges noticeably more reliably than 12+ within a demo-length step
# budget - see tests/test_optimizer.py and the tuning notes in README.md.
optimizer:
  # Must equal the active manifest's anchor count. Every z dimension directly
  # represents one anchor logit, so dimensionality is exact.
  search_dims: 7
  step_size_explore: 1.0
  step_size_refine_min: 0.03
  step_momentum: 0.6
  noise_threshold: 0.05     # reward diffs smaller than this are EEG jitter
  reward_window_steps: 8    # ~2s of FAA readings averaged per accept/reject
  bounds: 1.5               # anchor-weight logits need enough range to let one
                            # anchor dominate after softmax; pair with
                            # run_general_stable_diffusion.py --temperature 5-8.
  algorithm: "latent_turbo"   # "hill_climb" | "es_1p1" | "gp_bo" | "latent_turbo"
                            # latent_turbo = Noise-Aware Latent TuRBO: local GP +
                            # heteroscedastic noise + Thompson sampling + adaptive
                            # trust region. Best for a noisy FAA reward.

# CALIBRATE -> EXPLORE -> REFINE -> SETTLE, with RECOVER as an escape hatch.
state_machine:
  calibrate_duration_s: 30.0
  settle_reward_threshold: 0.25       # was 0.55 - realistic plateau for a clipped FAA z-score
  settle_reward_std_threshold: 0.2   # plateau tightness: SETTLE needs recent reward std below this
  settle_motion_threshold: 0.1
  settle_patience_steps: 3
  min_steps_before_settle: 20
  recover_negative_streak: 4
  recover_reward_margin: -0.25        # RECOVER counts only clearly-bad rewards, not ordinary z-score dips
  recover_widen_factor: 1.5
  stagnation_patience_steps: 6        # escape a mediocre low-variance plateau (revert+widen) so
                                      # convergence doesn't depend on absolute-reward RECOVER

  max_steps: 100             # convergence expected in 10-30 steps for a
                             # cooperative real signal; noisy/adversarial
                             # cases can take longer - see README.md
  refine_entry_reward: 0.05  # level-gated, not slope-gated (see state_machine.py)
  refine_exit_margin: 0.1

generator:
  # OPENAI_API_KEY is read from environment (.env).
  backend: "remote_diffusion"  # "procedural" | "diffusion" | "remote_diffusion" | "openai"
  diffusion_model_id: "stabilityai/sdxl-turbo"
  diffusion_steps: 2
  remote_diffusion_url: "http://localhost:8766"
  remote_diffusion_timeout_s: 30.0
  remote_diffusion_seed: 0                  # pinned seed -> smooth morph keyframes
  # Delay target retained for generator backends that fetch remote keyframes.
  remote_diffusion_keyframe_interval_s: 0.2
  openai_image_model: "gpt-image-2"
  openai_text_model: "gpt-5-mini"
  openai_image_size: "1024x1024"
  openai_image_quality: "low"
  openai_image_output_format: "png"
  # Final-frame cleanup: after the diffusion server renders the last frame, send
  # it through OpenAI's image-edit API to remove morph artifacts, then serve the
  # cleaned result to the frontend as target_frame.png. Set false to skip.
  finalize_enabled: true
  target_fps: 30
  frame_size: 512
  # Morph quality depends almost entirely on this bank. Keep a FIXED scaffold
  # (same subject/framing/background/lighting/phrasing) and vary ONE or two clean
  # visual axes per prompt - fur color, coat, ears, collar, pose. That keeps every
  # interpolated midpoint a coherent photo and makes consecutive keyframes close
  # enough to crossfade smoothly. ~10 prompts fully span the 8-dim search space
  # (PCA yields up to n_prompts-1 meaningful directions after centering).
  anchor_prompts:
  - "A white cat sits centered against a plain neutral background, shown at medium distance under soft studio lighting in a realistic style, with a calm expression and a forward-facing gaze."
  - "A cream cat sits centered against a plain neutral background, shown at medium distance under soft studio lighting in a realistic style, with a calm expression and a forward-facing gaze."
  - "A pale orange cat sits centered against a plain neutral background, shown at medium distance under soft studio lighting in a realistic style, with a calm expression and a forward-facing gaze."
  - "An orange tabby cat sits centered against a plain neutral background, shown at medium distance under soft studio lighting in a realistic style, with a calm expression and a forward-facing gaze."
  - "A gray tabby cat sits centered against a plain neutral background, shown at medium distance under soft studio lighting in a realistic style, with a calm expression and a forward-facing gaze."
  - "A solid gray cat sits centered against a plain neutral background, shown at medium distance under soft studio lighting in a realistic style, with a calm expression and a forward-facing gaze."
  - "A bluish-gray cat sits centered against a plain neutral background, shown at medium distance under soft studio lighting in a realistic style, with a calm expression and a forward-facing gaze."
  - "A dark brown cat sits centered against a plain neutral background, shown at medium distance under soft studio lighting in a realistic style, with a calm expression and a forward-facing gaze."
  - "A black cat sits centered against a plain neutral background, shown at medium distance under soft studio lighting in a realistic style, with a calm expression and a forward-facing gaze."
  - "A black-and-white cat sits centered against a plain neutral background, shown at medium distance under soft studio lighting in a realistic style, with a calm expression and a forward-facing gaze."
loop:
  target_latency_ms: 250          # perceive -> acquire -> decode -> generate, end to end
  optimizer_step_interval_s: 1.0   # matches faa.update_interval_s * reward_window_steps

# Per-candidate presentation schedule (see src/signal_service/presentation.py).
# Fixes reward-delay: morph, then hold, then score - and only the scoring
# interval's FAA is attributed to the candidate. When enabled, one clean
# candidate takes transition_s + stabilize_s + score_s (~5s here) instead of
# ~1s, which favors sample-efficient BO (algorithm: latent_turbo recommended).
presentation:
  enabled: false            # true = scored-interval path; false = simple per-window averaging
  transition_s: 1.5         # morph A -> B (not scored)
  stabilize_s: 2.0          # hold B; FAA window fills with stable EEG (not scored). MUST be >= faa.window_s
  score_s: 1.5              # scoring window - the FAA here is the reward for B
